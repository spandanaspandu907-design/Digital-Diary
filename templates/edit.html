<!DOCTYPE html>
<html>
<head>

    <title>Edit Entry</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Edit Entry</h1>

        <form method="POST">

            <textarea name="content" rows="10"
            cols="40">{{ entry.content }}</textarea>

            <br><br>

            <button type="submit">
                Update Entry
            </button>

        </form>

    </div>

</body>
</html>
