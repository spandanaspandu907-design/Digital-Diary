<!DOCTYPE html>
<html>
<head>

    <title>Register</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Register</h1>

      <form method="POST">

    <input
    type="text"
    name="username"
    placeholder="Enter Username">

    <br><br>

    <input
    type="email"
    name="email"
    placeholder="Enter Email">

    <br><br>

    <input
    type="password"
    name="password"
    placeholder="Create Password">

    <br><br>

    <button type="submit">
        Register
    </button>

</form>

    </div>

</body>
</html>
