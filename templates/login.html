<!DOCTYPE html>
<html>

<head>

    <title>Login</title>

    <link rel="stylesheet"
    href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>Login</h1>

        <form method="POST">

            <input
            type="email"
            name="email"
            placeholder="Enter Email">

            <br><br>

            <input
            type="password"
            name="password"
            placeholder="Enter Password">

            <br><br>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>

</html>
